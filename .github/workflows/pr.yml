name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  rust-lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + clippy + rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Linux deps (for tauri builds in lint)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev

      # tauri::generate_context!() asserts the configured frontendDist
      # path exists at compile time and panics in clippy / cargo
      # check if it doesn't. The path is `../dist` (the Vite output),
      # which only exists after `npm run build`. Set up Node + build
      # the frontend so the macro can resolve.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install frontend deps
        run: npm ci
      - name: Build frontend (for tauri::generate_context!)
        run: npm run build

      - name: rustfmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

  rust-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev
      # Same generate_context! constraint as rust-lint — need a
      # frontend dist on disk before the lib test target compiles.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install frontend deps
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: cargo test
        working-directory: src-tauri
        run: cargo test --no-default-features

  # Audit P1-4: scan the Rust dependency tree for CVEs published to
  # the RustSec Advisory Database. cargo audit is the de-facto tool
  # used by every serious Rust project. Fails the build on any
  # unyanked HIGH/CRITICAL — informational + low advisories pass
  # through (they show up in the log but don't block the merge).
  cargo-audit:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        # Unpinned — the previously-pinned 0.21.0 chokes on a
        # malformed advisory file that landed in the upstream
        # RustSec database (rssn/RUSTSEC-2026-0038.md TOML parse
        # error). Newer versions of cargo-audit handle malformed
        # entries gracefully. `--locked` still keeps the cargo-audit
        # build itself reproducible against its own lockfile.
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        working-directory: src-tauri
        # cargo-audit 0.21+ accepts each --deny category as a
        # separate flag (the comma-list syntax was removed). Failing
        # on unmaintained / unsound / yanked layers stricter checks
        # over the default vulnerability-only baseline. Add
        # `--ignore RUSTSEC-XXXX-YYYY` (with rationale) for any
        # advisory we've consciously accepted as not-applicable.
        run: |
          cargo audit \
            --deny unmaintained \
            --deny unsound \
            --deny yanked
