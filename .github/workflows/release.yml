name: Release

# Triggered on a version tag push (v0.1.0, v1.0.0-rc1, etc.).
# Builds Auracle Desktop for macOS, Windows, and Linux + uploads
# everything to a draft GitHub Release.
#
# ── Signing strategy (the v1 plan — UNSIGNED is fine) ────────────
#
# This workflow ships SIGNED artifacts when the secrets below are set,
# and UNSIGNED artifacts when they're not. Users on unsigned builds see:
#
#   macOS:    "Auracle Desktop can't be opened because Apple cannot
#             check it for malicious software." Fix: right-click →
#             Open → confirm. One-time per install. Doc on /download.
#   Windows:  "Windows protected your PC" SmartScreen warning. Click
#             "More info" → "Run anyway". Reputation builds over time.
#   Linux:    Usually no warning. Some distros may want gpg-signed
#             .deb / .rpm — currently unsigned for both.
#
# The Auracle launch plan defers OS code-signing certs (~$500/yr) until
# there are paying customers regularly using the desktop apps. The
# updater key is FREE and SHOULD be generated via setup-updater-keys.sh
# even on the unsigned path — without it, auto-update won't work and
# customers have to manually re-download for every release.
#
# ── Required secrets ─────────────────────────────────────────────
# TAURI_SIGNING_PRIVATE_KEY            Updater signing key (FREE — generate
# TAURI_SIGNING_PRIVATE_KEY_PASSWORD   via scripts/setup-updater-keys.sh)
#
# ── Optional secrets (add when you procure certs) ────────────────
# APPLE_CERTIFICATE                    base64 of .p12 from Apple Dev portal
# APPLE_CERTIFICATE_PASSWORD           password protecting the .p12
# APPLE_SIGNING_IDENTITY               "Developer ID Application: …"
# APPLE_ID                             Apple ID email for notarization
# APPLE_PASSWORD                       app-specific password for notarytool
# APPLE_TEAM_ID                        10-char team identifier
#
# When any of those is unset the macOS build produces an UNSIGNED .dmg.
# Users see Gatekeeper warning on first launch — documented on the
# /download page so they know what to expect.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            # Universal Mac binary needs BOTH arch targets installed —
            # 'universal-apple-darwin' is a Tauri-bundler concept that
            # combines the two below; dtolnay/rust-toolchain doesn't
            # accept it as a rustup target. Fix: comma-separate the
            # actual rustup targets here, keep --target
            # universal-apple-darwin in args for Tauri.
            target: "aarch64-apple-darwin, x86_64-apple-darwin"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            target: ""
            args: ""
          - platform: "windows-latest"
            target: ""
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # tauri-action invokes `npm run tauri build`, which resolves
      # `tauri` from node_modules/.bin (provided by the
      # @tauri-apps/cli devDep). Without this explicit install step
      # the action skips installing for projects with a custom build
      # command, so `tauri` is unresolvable at script-run time and
      # the build aborts with `sh: tauri: command not found`. `npm ci`
      # uses the committed lockfile so dep versions are reproducible
      # across runs.
      - name: Install frontend deps
        run: npm ci

      # OS code signing (F1) — AUTO-ENGAGES when the Apple secrets exist,
      # ad-hoc otherwise. We export APPLE_* into $GITHUB_ENV (which the
      # Tauri build step below inherits) ONLY when the certificate secret
      # is non-empty, so absent secrets stay genuinely UNSET rather than
      # empty-string — an empty APPLE_CERTIFICATE makes `security import`
      # fail with "parameters were not valid". No code edit is needed when
      # the operator procures an Apple Developer ID: just set the six
      # secrets via `gh secret set` and the next release signs + notarizes.
      - name: Configure Apple signing (auto, no-op without secrets)
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            {
              echo "APPLE_CERTIFICATE=$APPLE_CERTIFICATE"
              echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
              echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_PASSWORD=$APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
            echo "Apple Developer ID signing + notarization ENABLED for this build."
          else
            echo "No Apple signing secrets present — building ad-hoc (Gatekeeper"
            echo "shows 'unidentified developer'; users right-click → Open once)."
          fi

      - name: Build + bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — FREE, ALWAYS set this (generate via
          # ./scripts/setup-updater-keys.sh). Without it, auto-update
          # won't work and every release needs manual re-download.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # OS code signing is injected by the "Configure Apple signing"
          # step above (into $GITHUB_ENV) — present only when the secrets
          # are set, so this build is Developer-ID signed + notarized in
          # production and ad-hoc in their absence. No edit needed here.
        with:
          # Only create a GitHub Release when triggered by a tag push.
          # workflow_dispatch on main / a branch just builds artifacts
          # (downloadable from the workflow run's Artifacts panel)
          # without trying to create a release.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Auracle Desktop {0}', github.ref_name) || '' }}
          releaseBody: |
            ## Install

            See https://auracle-engine.com/download for per-OS install
            instructions, including the one-time "trust this download"
            workaround on macOS (these builds are ad-hoc signed but
            not Apple-Developer-ID notarized yet).

            ## Changes

            See [CHANGELOG.md](https://github.com/SiixQuant/auracle-desktop/blob/main/CHANGELOG.md).
          releaseDraft: true
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
          args: ${{ matrix.args }}

      # ── Stable-name aliases for the marketing site ─────────────
      # tauri-action uploads version-stamped filenames
      # (Auracle.Desktop_0.1.3_universal.dmg). The marketing site
      # links to /releases/latest/download/<file>, which requires
      # the filename to NOT contain the version (otherwise marketing
      # HTML needs editing every release).
      #
      # This step copies each platform's main installer to a short
      # stable name and uploads it as an additional asset on the
      # same release. The download.html links target these short
      # names exclusively — no marketing-site edit needed per
      # release. Sig files, .app.tar.gz, latest.json, and the
      # original versioned installers are all left in place for
      # power users / the auto-updater.
      - name: Upload stable-name aliases (macOS)
        if: matrix.platform == 'macos-latest' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DMG=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          cp "$DMG" "Auracle-Desktop-mac.dmg"
          gh release upload "${{ github.ref_name }}" \
            "Auracle-Desktop-mac.dmg" \
            --repo "${{ github.repository }}" --clobber

      - name: Upload stable-name aliases (Linux)
        if: matrix.platform == 'ubuntu-22.04' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DEB=$(ls src-tauri/target/release/bundle/deb/*.deb | head -1)
          RPM=$(ls src-tauri/target/release/bundle/rpm/*.rpm | head -1)
          APP=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          cp "$DEB" "Auracle-Desktop-linux.deb"
          cp "$RPM" "Auracle-Desktop-linux.rpm"
          cp "$APP" "Auracle-Desktop-linux.AppImage"
          gh release upload "${{ github.ref_name }}" \
            "Auracle-Desktop-linux.deb" \
            "Auracle-Desktop-linux.rpm" \
            "Auracle-Desktop-linux.AppImage" \
            --repo "${{ github.repository }}" --clobber

      # Windows used to invoke `gh release upload` directly, but the
      # PowerShell/`gh` combo on windows-latest hits intermittent
      # `HTTP 401: Bad credentials` from a known env-var propagation
      # quirk (the same flow works fine on bash/macOS/Linux runners
      # with the exact same secret). Switched to softprops/action-
      # gh-release which uses Octokit directly and handles auth
      # cleanly regardless of shell — same end state (one stable-
      # name MSI uploaded alongside the versioned one).
      - name: Stage Windows stable-name MSI
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          Copy-Item $msi.FullName "Auracle-Desktop-windows.msi"

      - name: Upload stable-name MSI (Windows)
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: Auracle-Desktop-windows.msi
          fail_on_unmatched_files: true

  # ── latest.json builder for the auto-updater ─────────────────
  # Runs after all three platform builds complete. tauri-action
  # generates per-platform .sig files but doesn't upload them to
  # the release; this job downloads them, builds the latest.json
  # manifest the Tauri updater fetches at runtime
  # (https://github.com/.../releases/latest/download/latest.json),
  # and uploads it alongside the binaries.
  publish-updater:
    needs: build
    runs-on: ubuntu-latest
    # Run even if a platform build leg failed (e.g. Windows): the manifest
    # is built from whatever platforms DID succeed, so a single bad leg can
    # no longer take down auto-update for macOS/Linux.
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Wait for asset uploads to settle
        run: sleep 30

      - name: Build + upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          # Install tauri-cli for the sign subcommand
          cargo install tauri-cli --version "^2" --locked

          mkdir -p _sig && cd _sig

          # tauri-action uploads the main installers + .app.tar.gz to
          # the draft release but DROPS the .sig files. Easiest fix:
          # re-download each installer (auth'd via gh) and sign it
          # locally with the same key the workflow has access to.
          # Result is byte-identical to what tauri-action discarded.
          DMG_TARGZ="Auracle-Desktop-mac.dmg"
          APP_TARGZ_NAME="Auracle.Desktop_universal.app.tar.gz"
          MSI_NAME="Auracle-Desktop-windows.msi"
          APPIMG_NAME="Auracle-Desktop-linux.AppImage"

          # Download whatever platform installers DID build. A failed leg
          # (e.g. Windows) simply leaves its file absent — skip it rather
          # than aborting the whole manifest.
          for f in "$APP_TARGZ_NAME" "$MSI_NAME" "$APPIMG_NAME"; do
            echo "Downloading $f..."
            gh release download "$TAG" --repo "$REPO" --pattern "$f" --clobber \
              || echo "  ($f absent — skipping)"
          done

          # Write signing key to a file
          mkdir -p ~/.tauri
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | base64 -d > ~/.tauri/key 2>/dev/null \
            || printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > ~/.tauri/key
          chmod 600 ~/.tauri/key

          # Bug observed in v0.1.3 + v0.1.5: cargo-tauri rejects
          # `--private-key-path` when the TAURI_SIGNING_PRIVATE_KEY env
          # var is ALSO set (the two are mutually exclusive per the
          # cargo-tauri CLI parser, but the env-var path treats it as
          # equivalent to `--private-key <inline>`). The job-level env
          # block leaks TAURI_SIGNING_PRIVATE_KEY into this step. Fix:
          # unset before invoking so only the explicit --private-key-path
          # arg wins.
          for f in "$APP_TARGZ_NAME" "$MSI_NAME" "$APPIMG_NAME"; do
            [ -f "$f" ] || { echo "Skipping $f (not built)"; continue; }
            echo "Signing $f..."
            env -u TAURI_SIGNING_PRIVATE_KEY \
              cargo tauri signer sign \
                --private-key-path ~/.tauri/key \
                --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
                "$f"
          done

          read_sig() { [ -f "$1" ] && cat "$1" || true; }
          MAC_SIG=$(read_sig "${APP_TARGZ_NAME}.sig")
          WIN_SIG=$(read_sig "${MSI_NAME}.sig")
          LIN_SIG=$(read_sig "${APPIMG_NAME}.sig")

          # macOS is the primary target — if it didn't sign, there's no
          # point publishing a manifest. Other platforms are best-effort.
          if [ -z "$MAC_SIG" ]; then
            echo "::error::macOS artifact missing/unsigned — cannot publish updater manifest"
            exit 1
          fi

          # Strip leading 'v' from tag for the version field
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          # Build the platforms map from ONLY the platforms that signed, so a
          # failed leg can't blank auto-update for the platforms that worked.
          PLATFORMS=""
          add_platform() { PLATFORMS="${PLATFORMS:+$PLATFORMS,}$1"; }
          add_platform "\"darwin-x86_64\": { \"signature\": \"${MAC_SIG}\", \"url\": \"${BASE}/${APP_TARGZ_NAME}\" }"
          add_platform "\"darwin-aarch64\": { \"signature\": \"${MAC_SIG}\", \"url\": \"${BASE}/${APP_TARGZ_NAME}\" }"
          [ -n "$LIN_SIG" ] && add_platform "\"linux-x86_64\": { \"signature\": \"${LIN_SIG}\", \"url\": \"${BASE}/${APPIMG_NAME}\" }"
          [ -n "$WIN_SIG" ] && add_platform "\"windows-x86_64\": { \"signature\": \"${WIN_SIG}\", \"url\": \"${BASE}/${MSI_NAME}\" }"

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See the release page for changelog and per-platform install notes.",
            "pub_date": "${PUB_DATE}",
            "platforms": { ${PLATFORMS} }
          }
          EOF

          UPLOADS=(latest.json)
          for s in "${APP_TARGZ_NAME}.sig" "${MSI_NAME}.sig" "${APPIMG_NAME}.sig"; do
            [ -f "$s" ] && UPLOADS+=("$s")
          done
          gh release upload "$TAG" --repo "$REPO" "${UPLOADS[@]}" --clobber

          # Promote the draft to published so /releases/latest/download
          # actually resolves to this tag.
          gh release edit "$TAG" --repo "$REPO" --draft=false
