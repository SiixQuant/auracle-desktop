# gitleaks — CI secret-scanning workflow.
#
# The .gitleaks.toml CONFIG is vendored into each repo from the
# canonical copy at SiixQuant/Auracle/.gitleaks.toml. When the
# canonical file changes, copy it into each satellite repo:
#
#   for r in auracle-desktop auracle-forge-desktop \
#            auracle-installer auracle-marketing; do
#     cp ~/Downloads/auracle/.gitleaks.toml ~/Downloads/$r/.gitleaks.toml
#   done
#
# Previously this step fetched the config via raw.githubusercontent.com,
# but SiixQuant/Auracle is private and the raw endpoint blocks anonymous
# reads on private repos -> every gitleaks run failed with curl 404.
# Vendoring removes the cross-repo runtime coupling. (AUDIT 2026-05-16
# S4 fix.)

name: gitleaks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  # gitleaks-action lists the PR's commits to pick its scan range and
  # (with GITLEAKS_ENABLE_COMMENTS) comments findings on the PR; without
  # this the action 403s on pull_request events before scanning.
  pull-requests: write

jobs:
  scan:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so gitleaks scans all commits, not just diff.
          fetch-depth: 0

      - name: Verify vendored .gitleaks.toml is present
        # The config is vendored into each repo (see header). This step
        # exists as a defensive check so a missing file fails loudly
        # rather than gitleaks silently scanning with default rules.
        run: |
          test -f .gitleaks.toml || { echo "FATAL: .gitleaks.toml missing — re-vendor from SiixQuant/Auracle"; exit 1; }
          ls -la .gitleaks.toml

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_COMMENTS: "true"
