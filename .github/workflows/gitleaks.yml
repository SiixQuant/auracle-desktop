# gitleaks — CI secret-scanning workflow.
#
# STASHED HERE pending T-17 (gh auth refresh -h github.com -s workflow).
# Once activated:
#
#   git mv docs/ci-templates/gitleaks.yml .github/workflows/gitleaks.yml
#   git commit -m "ci: activate gitleaks scanning"
#   git push origin main
#
# The .gitleaks.toml CONFIG lives only in the main auracle/ repo.
# This workflow references it via raw URL so all 5 repos enforce
# the same patterns + allowlist.

name: gitleaks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks scans all commits, not just diff.
          fetch-depth: 0

      - name: Download canonical .gitleaks.toml from main auracle/ repo
        # GITLEAKS_CONFIG expects a LOCAL FILE PATH, not a URL.
        # We fetch the canonical config from the main auracle/ repo
        # so every Auracle repo enforces the same patterns +
        # allowlist (Auracle-specific akey_ / HOUSTON_ADMIN_KEY /
        # JUPYTER_TOKEN matchers + allowlist for the dev placeholder
        # Ed25519 pubkey in license.py + test fixtures).
        run: |
          curl -fsSL https://raw.githubusercontent.com/SiixQuant/Auracle/main/.gitleaks.toml \
            -o .gitleaks.toml
          ls -la .gitleaks.toml

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_COMMENTS: "true"
