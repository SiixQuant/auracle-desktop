<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auracle Desktop</title>
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo-dot" id="status-dot" title="Stack health"></span>
      <strong>Auracle Desktop</strong>
      <span class="version" id="launcher-version">v0.1.9</span>
    </div>
    <nav class="tabs">
      <button data-view="dashboard" class="tab active">Dashboard</button>
      <button data-view="diagnostics" class="tab">Diagnostics</button>
      <button data-view="logs" class="tab">Logs</button>
      <button data-view="settings" class="tab">Settings</button>
    </nav>
  </header>

  <main id="view-root">
    <!-- View partials are loaded into #view-root by app.js -->
  </main>

  <!--
    Vanilla JS — no build step. Production launcher will likely
    swap this for Vue or React per the launcher plan, but the
    scaffolding stays runnable today with `cargo tauri dev` so the
    Rust + frontend boundary can be exercised end-to-end while the
    UI layer evolves.
  -->
  <script type="module" src="app.js"></script>
</body>
</html>
